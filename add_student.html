<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додати студента</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="navbar">
        <a href="/" class="navbar-brand">🎓 StudentApp</a>
        <nav class="navbar-nav">
            <a href="/" class="navbar-link">Головна</a>
            <a href="/students" class="navbar-link">Студенти</a>
            <a href="/search_greades" class="navbar-link">Оцінки</a>
            <a href="/add_student" class="navbar-link active">Додати</a>
            <a href="/join" class="navbar-link">Оновлення</a>
            <a href="/login" class="navbar-link">Вхід</a>
        </nav>
    </header>

    <main class="container" style="max-width: 600px;">
        <div class="card">
            <h2 class="card-title">Додати нового студента</h2>
            <p class="card-subtitle">Введіть академічні дані для збереження у базі.</p>

            {% if message %}
                <div class="alert {% if status == 'success' %}alert-success{% else %}alert-error{% endif %}">
                    {{ message }}
                </div>
            {% endif %}

            <form method="POST" action="/add_student">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label">ПІБ Студента</label>
                    <input type="text" name="username" class="form-control" placeholder="Іванов Іван Іванович" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Університет</label>
                    <input type="text" name="university" class="form-control" placeholder="Повна назва ВНЗ" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Спеціальність</label>
                        <input type="text" name="specialty" class="form-control" placeholder="Напр. Інженерія ПЗ" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Група</label>
                        <input type="text" name="group" class="form-control" placeholder="Напр. ІПЗ-21" required>
                    </div>
                </div>

                <button type="submit" class="btn">Зберегти студента</button>
            </form>
        </div>
    </main>

    <footer class="footer">&copy; 2026 StudentApp.</footer>
</body>
</html>
