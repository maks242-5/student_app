<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask and SQLite</title>
    <style>
        table, th, td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table style="width:100%">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>about</th>
            <th>Country</th>
            <th>Phone Number</th>
        </tr>
        {% for participant in data %}
        <tr>
            <td>{{ participant["name"] }}</td>
            <td>{{ participant["email"] }}</td>
            <td>{{ participant["about"] }}</td>
            <td>{{ participant["country"] }}</td>
            <td>{{ participant["phone"] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
